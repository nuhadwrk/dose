<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pediatric Dosage Calculator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#2a9d8f">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* THEME AND STYLING (unchanged from previous mobile/web-friendly version) */
    :root {
      --bg-color: #f0f4f8;
      --text-color: #1d3557;
      --card-bg: #ffffff;
      --border-color: #e0e0e0;
      --primary: #2a9d8f;
      --primary-hover: #21867a;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    }
    [data-theme="dark"] {
      --bg-color: #1e1e2f;
      --text-color: #e0e0e0;
      --card-bg: #2a2a3d;
      --border-color: #444;
      --primary: #00bfa6;
      --primary-hover: #009d88;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Inter", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 32px 16px;
      transition: background-color 0.3s, color 0.3s;
    }
    h1 { text-align: center; font-size: 1.6rem; margin-bottom: 24px; }
    .controls {
      display: flex; justify-content: center; align-items: center;
      gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
    }
    label { font-weight: 600; }
    input[type="number"] {
      padding: 10px; font-size: 1rem; border: 1px solid var(--border-color);
      border-radius: 8px; width: 120px; background: var(--card-bg); color: var(--text-color);
    }
    button {
      padding: 10px 20px; font-size: 1rem; background-color: var(--primary);
      color: #fff; border: none; border-radius: 8px; cursor: pointer;
      transition: background-color 0.25s ease;
    }
    button:hover { background-color: var(--primary-hover); }
    .toggle-theme { position: fixed; top: 16px; right: 16px; z-index: 10; }
    .table-wrapper {
      width: 100%; overflow-x: auto; background: var(--card-bg);
      border-radius: 12px; box-shadow: var(--shadow);
    }
    table {
      width: 100%; border-collapse: collapse; min-width: 640px;
    }
    th, td {
      padding: 12px 8px; border-bottom: 1px solid var(--border-color);
      text-align: center; font-size: 0.9rem;
    }
    th {
      background: #f7f9fb; font-weight: 600; position: sticky; top: 0; z-index: 1;
    }
    [data-theme="dark"] th { background: #33364d; }
    tr:last-child td { border-bottom: none; }
    @media (max-width: 480px) {
      h1 { font-size: 1.4rem; }
      th, td { padding: 10px 6px; font-size: 0.8rem; }
      input[type="number"] { width: 100%; }
      .controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <button class="toggle-theme" onclick="toggleTheme()">Toggle Theme</button>
  <h1>Pediatric Dosage Calculator</h1>
  <div class="controls">
    <label for="weight">Weight (kg):</label>
    <input type="number" id="weight" value="3.14" min="0" step="0.01">
    <button onclick="calculateDoses()">Calculate</button>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Drug</th>
          <th>Formulation</th>
          <th>Mg/Kg</th>
          <th>Mg per dose</th>
          <th>Volume (ml)</th>
          <th>Frequency</th>
        </tr>
      </thead>
      <tbody id="output"></tbody>
    </table>
  </div>
  <script>
    const drugs = [
      { name: "Paracetamol", form: "IV / SUPP", dosePerKg: 15, conc: null, freq: "STAT" },
      { name: "Paracetamol", form: "250mg/5ml", dosePerKg: 15, conc: 250/5, freq: "TDS" },
      { name: "Paracetamol", form: "120mg/5ml", dosePerKg: 15, conc: 120/5, freq: "TDS" },
      { name: "Paracetamol", form: "Drops (80mg/ml)", dosePerKg: 10, conc: 80, freq: "TDS" },
      { name: "Cetirizine", form: "5mg/5ml", dosePerKg: 0.25, conc: 5/5, freq: "HS" },
      { name: "Levocetirizine", form: "2.5mg/5ml", dosePerKg: 0.125, conc: 2.5/5, freq: "HS" },
      { name: "Ondansetron", form: "IV", dosePerKg: null, fixedDose: 0.5, conc: null, freq: "STAT" },
      { name: "Ondansetron", form: "2mg/5ml", dosePerKg: 0.15, conc: 2/5, freq: "TDS" },
      { name: "Cefo-L", form: "50mg/5ml", dosePerKg: 8, conc: 50/5, freq: "BD" },
      { name: "Bactoclav", form: "125+31.25mg/5ml", dosePerKg: 50, conc: 125/5, freq: "BD" },
      { name: "Bactoclav", form: "250+62.5mg/5ml", dosePerKg: 50, conc: 250/5, freq: "BD" },
      { name: "Azithromycin", form: "200mg/5ml", dosePerKg: 10, conc: 200/5, freq: "OD" },
      { name: "Cefuroxime", form: "125mg/5ml", dosePerKg: 30, conc: 125/5, freq: "BD" },
      { name: "Ibuprofen", form: "100mg/5ml", dosePerKg: null, fixedDose: 31.4, conc: 100/5, freq: "BD/TDS" },
      { name: "Meftal", form: "50mg/5ml", dosePerKg: 6.5, conc: 50/5, freq: "TDS" },
      { name: "Meftal", form: "125mg/5ml", dosePerKg: 6.5, conc: 125/5, freq: "TDS" },
      { name: "Ranitidine", form: "75mg/5ml", dosePerKg: null, fixedDose: 15.7, conc: 75/5, freq: "BD" },
      { name: "Domperidone", form: "5mg/5ml", dosePerKg: null, fixedDose: 1.3, conc: 5/5, freq: "TDS" },
      { name: "Acyclovir", form: "400mg/5ml", dosePerKg: null, fixedDose: 63, conc: 400/5, freq: "QID" },
      { name: "Inj Ceftriaxone", form: "", dosePerKg: 50, conc: null, freq: "BD" },
      { name: "Inj Cefuroxime", form: "", dosePerKg: 75, conc: null, freq: "BD" },
      { name: "Hydrocort", form: "", dosePerKg: null, fixedDose: 6.3, conc: null, freq: "STAT" },
      { name: "Hyoscine butylbromide", form: "", dosePerKg: null, fixedDose: 1.3, conc: null, freq: "TDS" },
      { name: "Pantop", form: "", dosePerKg: 1.0, conc: null, freq: "BD" },
      { name: "Inj Midaz", form: "", dosePerKg: 0.2, conc: null, freq: "STAT" }
    ];
    function calculateDoses() {
      const weight = parseFloat(document.getElementById("weight").value) || 0;
      const tbody = document.getElementById("output");
      tbody.innerHTML = "";
      drugs.forEach(drug => {
        const dose = drug.fixedDose ?? (drug.dosePerKg ? drug.dosePerKg * weight : null);
        const doseDisplay = dose ? `${dose.toFixed(1)} mg` : "-";
        const volume = dose && drug.conc ? (dose / drug.conc).toFixed(2) : (dose ? "-" : "");
        tbody.insertAdjacentHTML("beforeend", `<tr>
          <td>${drug.name}</td>
          <td>${drug.form}</td>
          <td>${drug.dosePerKg ?? "-"}</td>
          <td>${doseDisplay}</td>
          <td>${volume}</td>
          <td>${drug.freq}</td>
        </tr>`);
      });
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme") || "light";
      const next = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    }
    (function init() {
      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
      calculateDoses();
    })();
  </script>
</body>
</html>
